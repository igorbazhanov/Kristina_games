<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Arabic Words for Kids</title>
  <style>
    :root {
      --bg1: #fff3a6;
      --bg2: #a9e8ff;
      --card: #ffffff;
      --text: #263238;
      --green: #35b96f;
      --red: #ff4f67;
      --blue: #4da3ff;
      --purple: #8b6cff;
      --yellow: #ffd45a;
      --shadow: rgba(0,0,0,0.14);
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
      background: linear-gradient(145deg, var(--bg1), var(--bg2));
      color: var(--text);
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
    }

    .game {
      width: min(980px, 100vw);
      height: min(760px, 100vh);
      padding: 14px;
      display: grid;
      grid-template-rows: auto 1fr auto;
      gap: 12px;
    }

    .topbar {
      background: rgba(255,255,255,0.82);
      border: 4px solid white;
      border-radius: 26px;
      padding: 10px 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      box-shadow: 0 10px 24px var(--shadow);
      gap: 12px;
    }

    .title {
      font-size: clamp(21px, 4vw, 34px);
      font-weight: 1000;
    }

    .levelInfo {
      font-size: clamp(14px, 2.5vw, 18px);
      font-weight: 900;
      text-align: right;
    }

    .card {
      background: rgba(255,255,255,0.88);
      border: 5px solid white;
      border-radius: 34px;
      box-shadow: 0 14px 32px var(--shadow);
      padding: 14px;
      display: grid;
      grid-template-rows: auto auto auto 1fr;
      gap: 10px;
      min-height: 0;
      position: relative;
    }

    .picture {
      text-align: center;
      padding-top: 2px;
    }

    .emoji {
      font-size: clamp(72px, 14vw, 130px);
      line-height: 1;
      filter: drop-shadow(0 8px 0 rgba(0,0,0,0.08));
      animation: floaty 2.7s ease-in-out infinite;
    }

    @keyframes floaty {
      0%, 100% { transform: translateY(0) rotate(-1.5deg); }
      50% { transform: translateY(-6px) rotate(1.5deg); }
    }

    .russianWord {
      text-align: center;
      font-size: clamp(30px, 7vw, 56px);
      font-weight: 1000;
      color: #2c6fc9;
      line-height: 1;
    }

    .arabicHint {
      text-align: center;
      font-size: clamp(34px, 8vw, 64px);
      font-weight: 900;
      color: #263238;
      direction: rtl;
      line-height: 1.1;
      padding-bottom: 4px;
    }

    .slots {
      direction: rtl;
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 10px;
      min-height: 72px;
      align-items: center;
      padding: 4px 0 8px;
    }

    .slot {
      width: clamp(50px, 9vw, 72px);
      height: clamp(50px, 9vw, 72px);
      border-radius: 18px;
      background: #edf7ff;
      border: 4px dashed #7bbaf7;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: clamp(30px, 7vw, 48px);
      font-weight: 1000;
      direction: rtl;
      color: #2384d8;
    }

    .slot.filled {
      border-style: solid;
      background: #dcffd8;
      border-color: var(--green);
      color: #229b51;
      animation: pop 0.22s ease-out;
    }

    @keyframes pop {
      0% { transform: scale(0.45); }
      70% { transform: scale(1.18); }
      100% { transform: scale(1); }
    }

    .lettersArea {
      background: linear-gradient(145deg, #fff9e8, #e9f8ff);
      border: 4px solid white;
      border-radius: 28px;
      min-height: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 18px;
      box-shadow: inset 0 0 0 3px rgba(77,163,255,0.12);
    }

    .letters {
      direction: rtl;
      display: flex;
      justify-content: center;
      align-items: center;
      align-content: center;
      flex-wrap: wrap;
      gap: 14px;
      width: 100%;
    }

    .letterBtn {
      width: clamp(58px, 11vw, 86px);
      height: clamp(58px, 11vw, 86px);
      border: 0;
      border-radius: 22px;
      background: var(--yellow);
      color: #263238;
      font-size: clamp(32px, 7vw, 52px);
      font-weight: 1000;
      box-shadow: 0 7px 0 #e2aa25, 0 10px 22px rgba(0,0,0,0.14);
      cursor: pointer;
      direction: rtl;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.08s, filter 0.12s;
    }

    .letterBtn:active {
      transform: translateY(4px);
      box-shadow: 0 3px 0 #e2aa25, 0 6px 15px rgba(0,0,0,0.12);
    }

    .letterBtn.used {
      visibility: hidden;
      pointer-events: none;
    }

    .letterBtn.wrong {
      background: var(--red);
      color: white;
      animation: shake 0.32s ease-in-out;
      box-shadow: 0 7px 0 #c82d42, 0 10px 22px rgba(0,0,0,0.14);
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      20% { transform: translateX(-7px); }
      40% { transform: translateX(7px); }
      60% { transform: translateX(-5px); }
      80% { transform: translateX(5px); }
    }

    .message {
      position: absolute;
      left: 50%;
      top: 52%;
      transform: translate(-50%, -50%) scale(0);
      opacity: 0;
      pointer-events: none;
      background: white;
      color: var(--green);
      border: 5px solid var(--green);
      border-radius: 30px;
      padding: 18px 28px;
      font-size: clamp(30px, 8vw, 64px);
      font-weight: 1000;
      box-shadow: 0 14px 40px rgba(0,0,0,0.22);
      transition: 0.22s;
      text-align: center;
      z-index: 5;
    }

    .message.show {
      opacity: 1;
      transform: translate(-50%, -50%) scale(1);
    }

    .bottom {
      background: rgba(255,255,255,0.8);
      border: 4px solid white;
      border-radius: 24px;
      padding: 10px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.1);
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      font-weight: 900;
    }

    button.control, select {
      border: 0;
      border-radius: 17px;
      padding: 11px 15px;
      font-size: 16px;
      font-weight: 900;
      background: var(--blue);
      color: white;
      box-shadow: 0 5px 0 #2776c9;
      cursor: pointer;
    }

    select {
      background: white;
      color: var(--text);
      border: 3px solid #d7efff;
      box-shadow: none;
      cursor: pointer;
    }

    button.control:active {
      transform: translateY(3px);
      box-shadow: 0 2px 0 #2776c9;
    }

    @media (max-width: 640px) {
      .game {
        height: 100vh;
        padding: 8px;
        gap: 8px;
      }

      .topbar, .card, .bottom {
        border-width: 3px;
      }

      .card {
        border-radius: 24px;
        padding: 8px;
        gap: 6px;
      }

      .emoji {
        font-size: 78px;
      }

      .lettersArea {
        padding: 10px;
        border-radius: 22px;
      }

      .letters {
        gap: 9px;
      }

      .letterBtn {
        width: 58px;
        height: 58px;
        border-radius: 17px;
        font-size: 35px;
      }

      .slot {
        width: 50px;
        height: 50px;
        border-radius: 15px;
        font-size: 33px;
      }

      button.control, select {
        font-size: 14px;
        padding: 9px 11px;
      }
    }
  </style>
</head>
<body>
  <div class="game">
    <div class="topbar">
      <div class="title">Арабские слова</div>
      <div class="levelInfo">
        <div id="categoryName">Животные</div>
        <div id="progress">1 / 1</div>
      </div>
    </div>

    <div class="card">
      <div class="picture">
        <div class="emoji" id="emoji">🐰</div>
      </div>

      <div class="russianWord" id="russianWord">заяц</div>
      <div class="arabicHint" id="arabicHint">أرنب</div>

      <div class="slots" id="slots"></div>

      <div class="lettersArea">
        <div class="letters" id="letters"></div>
      </div>

      <div class="message" id="message">Молодец!</div>
    </div>

    <div class="bottom">
      <button class="control" id="prevBtn">◀ Назад</button>
      <label>
        Категория:
        <select id="categorySelect"></select>
      </label>
      <button class="control" id="speakBtn">🔊 Сказать</button>
      <button class="control" id="restartBtn">↻ Заново</button>
      <button class="control" id="nextBtn">Вперёд ▶</button>
    </div>
  </div>

  <script>
    const categories = [
      {
        name: "Животные",
        words: [
          { ru: "заяц", ar: "أرنب", emoji: "🐰" },
          { ru: "кот", ar: "قط", emoji: "🐱" },
          { ru: "собака", ar: "كلب", emoji: "🐶" },
          { ru: "утка", ar: "بطة", emoji: "🦆" },
          { ru: "рыба", ar: "سمك", emoji: "🐟" },
          { ru: "лев", ar: "أسد", emoji: "🦁" }
        ]
      },
      {
        name: "Цвета",
        words: [
          { ru: "красный", ar: "أحمر", emoji: "🔴" },
          { ru: "синий", ar: "أزرق", emoji: "🔵" },
          { ru: "зелёный", ar: "أخضر", emoji: "🟢" },
          { ru: "жёлтый", ar: "أصفر", emoji: "🟡" },
          { ru: "чёрный", ar: "أسود", emoji: "⚫" },
          { ru: "белый", ar: "أبيض", emoji: "⚪" }
        ]
      },
      {
        name: "Еда",
        words: [
          { ru: "хлеб", ar: "خبز", emoji: "🍞" },
          { ru: "молоко", ar: "حليب", emoji: "🥛" },
          { ru: "яблоко", ar: "تفاح", emoji: "🍎" },
          { ru: "сыр", ar: "جبن", emoji: "🧀" },
          { ru: "сок", ar: "عصير", emoji: "🧃" },
          { ru: "яйцо", ar: "بيض", emoji: "🥚" }
        ]
      },
      {
        name: "Семья",
        words: [
          { ru: "мама", ar: "أم", emoji: "👩" },
          { ru: "папа", ar: "أب", emoji: "👨" },
          { ru: "брат", ar: "أخ", emoji: "👦" },
          { ru: "сестра", ar: "أخت", emoji: "👧" },
          { ru: "дом", ar: "بيت", emoji: "🏠" }
        ]
      },
      {
        name: "Школа",
        words: [
          { ru: "книга", ar: "كتاب", emoji: "📘" },
          { ru: "ручка", ar: "قلم", emoji: "🖊️" },
          { ru: "сумка", ar: "حقيبة", emoji: "🎒" },
          { ru: "стол", ar: "طاولة", emoji: "🪑" },
          { ru: "звезда", ar: "نجمة", emoji: "⭐" }
        ]
      },
      {
        name: "Числа",
        words: [
          { ru: "один", ar: "واحد", emoji: "1️⃣" },
          { ru: "два", ar: "اثنان", emoji: "2️⃣" },
          { ru: "три", ar: "ثلاثة", emoji: "3️⃣" },
          { ru: "четыре", ar: "أربعة", emoji: "4️⃣" },
          { ru: "пять", ar: "خمسة", emoji: "5️⃣" }
        ]
      }
    ];

    const extraArabicLetters = [
      "ا","ب","ت","ث","ج","ح","خ","د","ذ","ر","ز","س","ش","ص","ض","ط","ظ","ع","غ","ف","ق","ك","ل","م","ن","ه","و","ي"
    ];

    const emojiEl = document.getElementById("emoji");
    const russianWordEl = document.getElementById("russianWord");
    const arabicHintEl = document.getElementById("arabicHint");
    const slotsEl = document.getElementById("slots");
    const lettersEl = document.getElementById("letters");
    const categoryNameEl = document.getElementById("categoryName");
    const progressEl = document.getElementById("progress");
    const categorySelect = document.getElementById("categorySelect");
    const messageEl = document.getElementById("message");

    let categoryIndex = 0;
    let wordIndex = 0;
    let targetLetters = [];
    let nextIndex = 0;

    function splitArabicWord(word) {
      return Array.from(word.replace(/\s+/g, ""));
    }

    function shuffle(arr) {
      const a = [...arr];
      for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
      }
      return a;
    }

    function getExtraLetters(wordLetters, count) {
      const result = [];
      while (result.length < count) {
        const l = extraArabicLetters[Math.floor(Math.random() * extraArabicLetters.length)];
        if (!wordLetters.includes(l) || Math.random() < 0.25) result.push(l);
      }
      return result;
    }

    function setupCategorySelect() {
      categorySelect.innerHTML = "";
      categories.forEach((cat, index) => {
        const option = document.createElement("option");
        option.value = index;
        option.textContent = `${index + 1}. ${cat.name}`;
        categorySelect.appendChild(option);
      });
    }

    function loadWord() {
      const item = categories[categoryIndex].words[wordIndex];
      targetLetters = splitArabicWord(item.ar);
      nextIndex = 0;

      emojiEl.textContent = item.emoji;
      russianWordEl.textContent = item.ru;
      arabicHintEl.textContent = item.ar;
      categoryNameEl.textContent = categories[categoryIndex].name;
      progressEl.textContent = `${wordIndex + 1} / ${categories[categoryIndex].words.length}`;
      categorySelect.value = categoryIndex;

      renderSlots();
      renderLetters();
    }

    function renderSlots() {
      slotsEl.innerHTML = "";
      targetLetters.forEach(() => {
        const slot = document.createElement("div");
        slot.className = "slot";
        slot.textContent = "";
        slotsEl.appendChild(slot);
      });
    }

    function renderLetters() {
      lettersEl.innerHTML = "";

      const extrasCount = Math.max(3, 8 - targetLetters.length);
      const allLetters = shuffle([...targetLetters, ...getExtraLetters(targetLetters, extrasCount)]);

      allLetters.forEach((letter) => {
        const btn = document.createElement("button");
        btn.className = "letterBtn";
        btn.textContent = letter;
        btn.dataset.letter = letter;
        btn.addEventListener("click", () => handleLetterClick(btn));
        lettersEl.appendChild(btn);
      });
    }

    function handleLetterClick(btn) {
      const clicked = btn.dataset.letter;
      const needed = targetLetters[nextIndex];

      if (clicked === needed) {
        const slot = slotsEl.children[nextIndex];
        slot.textContent = clicked;
        slot.classList.add("filled");
        btn.classList.add("used");
        nextIndex++;
        playTone(660, 0.08, "sine");

        if (nextIndex >= targetLetters.length) {
          showMessage("Молодец! 🎉", true);
          speakWord();
          setTimeout(nextWord, 1200);
        }
      } else {
        btn.classList.add("wrong");
        playTone(160, 0.12, "sawtooth");
        setTimeout(() => btn.classList.remove("wrong"), 360);
      }
    }

    function showMessage(text, good) {
      messageEl.textContent = text;
      messageEl.style.color = good ? "var(--green)" : "var(--red)";
      messageEl.style.borderColor = good ? "var(--green)" : "var(--red)";
      messageEl.classList.add("show");
      setTimeout(() => messageEl.classList.remove("show"), 850);
    }

    function nextWord() {
      wordIndex++;
      if (wordIndex >= categories[categoryIndex].words.length) {
        wordIndex = 0;
        categoryIndex = (categoryIndex + 1) % categories.length;
        showMessage("Новая категория! 🌟", true);
      }
      loadWord();
    }

    function prevWord() {
      wordIndex--;
      if (wordIndex < 0) {
        categoryIndex = (categoryIndex - 1 + categories.length) % categories.length;
        wordIndex = categories[categoryIndex].words.length - 1;
      }
      loadWord();
    }

    let audioCtx = null;
    function playTone(freq, dur, type) {
      try {
        audioCtx = audioCtx || new (window.AudioContext || window.webkitAudioContext)();
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = type;
        osc.frequency.value = freq;
        gain.gain.value = 0.07;
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.start();
        gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + dur);
        osc.stop(audioCtx.currentTime + dur);
      } catch(e) {}
    }

    function speakWord() {
      if (!("speechSynthesis" in window)) return;
      const item = categories[categoryIndex].words[wordIndex];
      window.speechSynthesis.cancel();

      const ru = new SpeechSynthesisUtterance(item.ru);
      ru.lang = "ru-RU";
      ru.rate = 0.8;

      const ar = new SpeechSynthesisUtterance(item.ar);
      ar.lang = "ar-SA";
      ar.rate = 0.72;

      window.speechSynthesis.speak(ru);
      setTimeout(() => window.speechSynthesis.speak(ar), 650);
    }

    document.getElementById("nextBtn").addEventListener("click", nextWord);
    document.getElementById("prevBtn").addEventListener("click", prevWord);
    document.getElementById("restartBtn").addEventListener("click", loadWord);
    document.getElementById("speakBtn").addEventListener("click", speakWord);

    categorySelect.addEventListener("change", () => {
      categoryIndex = Number(categorySelect.value);
      wordIndex = 0;
      loadWord();
    });

    setupCategorySelect();
    loadWord();
  </script>
</body>
</html>
