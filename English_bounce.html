<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Letter Bounce English</title>
  <style>
    :root {
      --bg1: #8fd3ff;
      --bg2: #f8f3a3;
      --card: #ffffff;
      --text: #263238;
      --good: #49c26b;
      --bad: #ff5b6e;
      --blue: #4da3ff;
      --purple: #8b6cff;
      --orange: #ffb84d;
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }

    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--text);
      background: linear-gradient(160deg, var(--bg1), var(--bg2));
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
    }

    .game {
      width: min(980px, 100vw);
      height: min(720px, 100vh);
      padding: 14px;
      display: grid;
      grid-template-rows: auto 1fr auto;
      gap: 12px;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      background: rgba(255,255,255,0.78);
      border: 3px solid rgba(255,255,255,0.75);
      border-radius: 24px;
      padding: 10px 14px;
      box-shadow: 0 10px 24px rgba(0,0,0,0.12);
    }

    .title {
      font-weight: 900;
      font-size: clamp(20px, 4vw, 34px);
      letter-spacing: 0.5px;
    }

    .meta {
      font-weight: 800;
      font-size: clamp(14px, 2.2vw, 18px);
      text-align: right;
    }

    .main {
      display: grid;
      grid-template-rows: auto 1fr;
      gap: 12px;
      min-height: 0;
    }

    .question {
      background: rgba(255,255,255,0.85);
      border: 4px solid white;
      border-radius: 30px;
      padding: 12px;
      box-shadow: 0 12px 30px rgba(0,0,0,0.13);
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      gap: 10px;
    }

    .navButton, .soundButton, .restartButton {
      border: 0;
      border-radius: 18px;
      padding: 11px 16px;
      background: var(--blue);
      color: white;
      font-weight: 900;
      font-size: 17px;
      box-shadow: 0 5px 0 #2776c9;
      cursor: pointer;
    }

    .navButton:active, .soundButton:active, .restartButton:active {
      transform: translateY(3px);
      box-shadow: 0 2px 0 #2776c9;
    }

    .pictureBox {
      text-align: center;
    }

    .emoji {
      font-size: clamp(70px, 13vw, 118px);
      line-height: 1;
      filter: drop-shadow(0 8px 0 rgba(0,0,0,0.08));
      animation: floaty 2.6s ease-in-out infinite;
    }

    @keyframes floaty {
      0%, 100% { transform: translateY(0) rotate(-2deg); }
      50% { transform: translateY(-7px) rotate(2deg); }
    }

    .hint {
      font-size: 18px;
      font-weight: 800;
      color: #607d8b;
      margin-top: 4px;
    }

    .answer {
      display: flex;
      justify-content: center;
      gap: 8px;
      margin-top: 10px;
      min-height: 54px;
    }

    .slot {
      width: clamp(42px, 8vw, 58px);
      height: clamp(42px, 8vw, 58px);
      border-radius: 17px;
      background: #edf6ff;
      border: 3px dashed #86bdf4;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: clamp(24px, 6vw, 34px);
      font-weight: 1000;
      color: #2c80d3;
      text-transform: uppercase;
    }

    .slot.filled {
      background: #d9ffd7;
      border-style: solid;
      border-color: var(--good);
      color: #27994a;
      animation: pop 0.22s ease-out;
    }

    @keyframes pop {
      0% { transform: scale(0.5); }
      70% { transform: scale(1.2); }
      100% { transform: scale(1); }
    }

    .playAreaWrap {
      position: relative;
      min-height: 0;
      background: rgba(255,255,255,0.42);
      border-radius: 32px;
      padding: 10px;
      box-shadow: inset 0 0 0 4px rgba(255,255,255,0.65);
    }

    canvas {
      width: 100%;
      height: 100%;
      display: block;
      background:
        radial-gradient(circle at 16% 20%, rgba(255,255,255,0.55) 0 8%, transparent 9%),
        radial-gradient(circle at 84% 72%, rgba(255,255,255,0.35) 0 7%, transparent 8%),
        linear-gradient(145deg, #fef8ff, #e9f7ff);
      border-radius: 26px;
      border: 5px solid white;
      box-shadow: inset 0 0 0 3px rgba(77,163,255,0.12), 0 10px 25px rgba(0,0,0,0.12);
      cursor: pointer;
    }

    .message {
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%) scale(0);
      background: white;
      border: 5px solid var(--good);
      border-radius: 28px;
      padding: 18px 28px;
      font-size: clamp(28px, 7vw, 56px);
      font-weight: 1000;
      color: var(--good);
      box-shadow: 0 14px 35px rgba(0,0,0,0.2);
      pointer-events: none;
      opacity: 0;
      transition: 0.25s;
      text-align: center;
      z-index: 4;
    }

    .message.show {
      transform: translate(-50%, -50%) scale(1);
      opacity: 1;
    }

    .bottom {
      display: flex;
      justify-content: center;
      gap: 10px;
      flex-wrap: wrap;
      background: rgba(255,255,255,0.75);
      border-radius: 24px;
      padding: 10px;
      font-weight: 800;
      box-shadow: 0 8px 20px rgba(0,0,0,0.09);
    }

    select {
      border: 3px solid #fff;
      border-radius: 16px;
      padding: 9px 12px;
      font-size: 16px;
      font-weight: 800;
      background: #fff;
      color: var(--text);
      outline: none;
    }

    @media (max-width: 640px) {
      .game {
        height: 100vh;
        padding: 8px;
        gap: 8px;
      }

      .question {
        grid-template-columns: auto 1fr auto;
        border-radius: 22px;
        padding: 8px;
      }

      .navButton, .soundButton, .restartButton {
        padding: 9px 11px;
        font-size: 14px;
      }

      .emoji {
        font-size: 72px;
      }

      .hint {
        font-size: 14px;
      }

      .answer {
        gap: 5px;
        margin-top: 6px;
      }

      .slot {
        width: 40px;
        height: 40px;
        border-radius: 13px;
        font-size: 24px;
      }
    }
  </style>
</head>
<body>
  <div class="game">
    <div class="topbar">
      <div class="title">Letter Bounce English</div>
      <div class="meta">
        <div id="categoryName">Pets</div>
        <div id="progressText">1 / 1</div>
      </div>
    </div>

    <div class="main">
      <div class="question">
        <button class="navButton" id="prevBtn">◀</button>

        <div class="pictureBox">
          <div class="emoji" id="emoji">🐱</div>
          <div class="hint">Click letters in order</div>
          <div class="answer" id="answer"></div>
        </div>

        <button class="navButton" id="nextBtn">▶</button>
      </div>

      <div class="playAreaWrap">
        <canvas id="canvas"></canvas>
        <div class="message" id="message">Good!</div>
      </div>
    </div>

    <div class="bottom">
      <label>
        Level:
        <select id="levelSelect"></select>
      </label>
      <button class="soundButton" id="speakBtn">🔊 Say word</button>
      <button class="restartButton" id="restartBtn">↻ Restart word</button>
    </div>
  </div>

  <script>
    const levels = [
      {
        name: "Pets",
        words: [
          { word: "cat", emoji: "🐱" },
          { word: "dog", emoji: "🐶" },
          { word: "pig", emoji: "🐷" },
          { word: "hen", emoji: "🐔" },
          { word: "cow", emoji: "🐮" }
        ]
      },
      {
        name: "Wild animals",
        words: [
          { word: "fox", emoji: "🦊" },
          { word: "bat", emoji: "🦇" },
          { word: "owl", emoji: "🦉" },
          { word: "bee", emoji: "🐝" },
          { word: "ant", emoji: "🐜" }
        ]
      },
      {
        name: "Colors",
        words: [
          { word: "red", emoji: "🔴" },
          { word: "blue", emoji: "🔵" },
          { word: "pink", emoji: "🌸" },
          { word: "gold", emoji: "⭐" },
          { word: "gray", emoji: "🐘" }
        ]
      },
      {
        name: "Numbers",
        words: [
          { word: "one", emoji: "1️⃣" },
          { word: "two", emoji: "2️⃣" },
          { word: "six", emoji: "6️⃣" },
          { word: "ten", emoji: "🔟" },
          { word: "four", emoji: "4️⃣" }
        ]
      },
      {
        name: "Food",
        words: [
          { word: "egg", emoji: "🥚" },
          { word: "jam", emoji: "🍓" },
          { word: "pie", emoji: "🥧" },
          { word: "milk", emoji: "🥛" },
          { word: "cake", emoji: "🍰" }
        ]
      },
      {
        name: "School",
        words: [
          { word: "pen", emoji: "🖊️" },
          { word: "bag", emoji: "🎒" },
          { word: "book", emoji: "📘" },
          { word: "desk", emoji: "🪑" },
          { word: "star", emoji: "⭐" }
        ]
      }
    ];

    const canvas = document.getElementById("canvas");
    const ctx = canvas.getContext("2d");
    const emojiEl = document.getElementById("emoji");
    const answerEl = document.getElementById("answer");
    const categoryNameEl = document.getElementById("categoryName");
    const progressTextEl = document.getElementById("progressText");
    const levelSelect = document.getElementById("levelSelect");
    const messageEl = document.getElementById("message");

    const colors = ["#4da3ff", "#8b6cff", "#ffb84d", "#49c26b", "#ff6ba6", "#40c4c8"];
    const extraLetters = "abcdefghijklmnopqrstuvwxyz";

    let levelIndex = 0;
    let wordIndex = 0;
    let balls = [];
    let currentWord = "";
    let currentEmoji = "";
    let nextLetterIndex = 0;
    let animationId = null;
    let lastTime = 0;

    function resizeCanvas() {
      const rect = canvas.getBoundingClientRect();
      const dpr = Math.max(1, window.devicePixelRatio || 1);
      canvas.width = Math.floor(rect.width * dpr);
      canvas.height = Math.floor(rect.height * dpr);
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    }

    function rand(min, max) {
      return Math.random() * (max - min) + min;
    }

    function chooseExtraLetters(word, count) {
      const result = [];
      while (result.length < count) {
        const ch = extraLetters[Math.floor(Math.random() * extraLetters.length)];
        if (!word.includes(ch) || Math.random() < 0.35) result.push(ch);
      }
      return result;
    }

    function shuffle(arr) {
      for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
      return arr;
    }

    function createBalls() {
      resizeCanvas();
      const rect = canvas.getBoundingClientRect();
      const w = rect.width;
      const h = rect.height;

      balls = [];
      const letters = [...currentWord.split(""), ...chooseExtraLetters(currentWord, Math.max(4, 9 - currentWord.length))];
      shuffle(letters);

      letters.forEach((letter, i) => {
        const radius = Math.min(34, Math.max(26, w / 15));
        let placed = false;
        let x, y;

        for (let tries = 0; tries < 200 && !placed; tries++) {
          x = rand(radius + 10, w - radius - 10);
          y = rand(radius + 10, h - radius - 10);
          placed = balls.every(b => Math.hypot(b.x - x, b.y - y) > radius * 2.35);
        }

        if (!placed) {
          x = rand(radius + 10, w - radius - 10);
          y = rand(radius + 10, h - radius - 10);
        }

        balls.push({
          letter,
          x,
          y,
          vx: rand(-42, 42) || 22,
          vy: rand(-42, 42) || -22,
          r: radius,
          color: colors[i % colors.length],
          wrongFlash: 0,
          goodFlash: 0,
          angle: rand(-0.2, 0.2),
          spin: rand(-0.4, 0.4)
        });
      });
    }

    function setupLevelSelect() {
      levelSelect.innerHTML = "";
      levels.forEach((level, i) => {
        const opt = document.createElement("option");
        opt.value = i;
        opt.textContent = `${i + 1}. ${level.name}`;
        levelSelect.appendChild(opt);
      });
    }

    function loadWord() {
      const item = levels[levelIndex].words[wordIndex];
      currentWord = item.word.toLowerCase();
      currentEmoji = item.emoji;
      nextLetterIndex = 0;

      emojiEl.textContent = currentEmoji;
      categoryNameEl.textContent = levels[levelIndex].name;
      progressTextEl.textContent = `${wordIndex + 1} / ${levels[levelIndex].words.length}`;
      levelSelect.value = levelIndex;

      answerEl.innerHTML = "";
      for (let i = 0; i < currentWord.length; i++) {
        const slot = document.createElement("div");
        slot.className = "slot";
        slot.textContent = "";
        answerEl.appendChild(slot);
      }

      createBalls();
      speakWord(false);
    }

    function fillNextSlot(letter) {
      const slot = answerEl.children[nextLetterIndex];
      slot.textContent = letter.toUpperCase();
      slot.classList.add("filled");
      nextLetterIndex++;
    }

    function showMessage(text, good = true) {
      messageEl.textContent = text;
      messageEl.style.borderColor = good ? "var(--good)" : "var(--bad)";
      messageEl.style.color = good ? "var(--good)" : "var(--bad)";
      messageEl.classList.add("show");
      setTimeout(() => messageEl.classList.remove("show"), 850);
    }

    function nextWord() {
      wordIndex++;
      if (wordIndex >= levels[levelIndex].words.length) {
        wordIndex = 0;
        levelIndex = (levelIndex + 1) % levels.length;
        showMessage("New level! 🌟");
      }
      loadWord();
    }

    function prevWord() {
      wordIndex--;
      if (wordIndex < 0) {
        levelIndex = (levelIndex - 1 + levels.length) % levels.length;
        wordIndex = levels[levelIndex].words.length - 1;
      }
      loadWord();
    }

    function handleCanvasClick(e) {
      const rect = canvas.getBoundingClientRect();
      const pointX = (e.clientX || e.touches?.[0]?.clientX) - rect.left;
      const pointY = (e.clientY || e.touches?.[0]?.clientY) - rect.top;

      for (let i = balls.length - 1; i >= 0; i--) {
        const b = balls[i];
        if (Math.hypot(b.x - pointX, b.y - pointY) <= b.r) {
          const needed = currentWord[nextLetterIndex];

          if (b.letter === needed) {
            b.goodFlash = 1;
            fillNextSlot(b.letter);
            balls.splice(i, 1);
            playTone(660, 0.08, "sine");

            if (nextLetterIndex >= currentWord.length) {
              showMessage("Great! 🎉");
              speakWord(true);
              setTimeout(nextWord, 1200);
            }
          } else {
            b.wrongFlash = 1;
            playTone(180, 0.12, "sawtooth");
          }

          break;
        }
      }
    }

    function updatePhysics(dt) {
      const rect = canvas.getBoundingClientRect();
      const w = rect.width;
      const h = rect.height;

      balls.forEach(b => {
        b.x += b.vx * dt;
        b.y += b.vy * dt;
        b.angle += b.spin * dt;

        if (b.x - b.r < 0) {
          b.x = b.r;
          b.vx = Math.abs(b.vx);
        }
        if (b.x + b.r > w) {
          b.x = w - b.r;
          b.vx = -Math.abs(b.vx);
        }
        if (b.y - b.r < 0) {
          b.y = b.r;
          b.vy = Math.abs(b.vy);
        }
        if (b.y + b.r > h) {
          b.y = h - b.r;
          b.vy = -Math.abs(b.vy);
        }

        b.wrongFlash = Math.max(0, b.wrongFlash - dt * 4.5);
        b.goodFlash = Math.max(0, b.goodFlash - dt * 6);
      });

      for (let i = 0; i < balls.length; i++) {
        for (let j = i + 1; j < balls.length; j++) {
          const a = balls[i];
          const b = balls[j];
          const dx = b.x - a.x;
          const dy = b.y - a.y;
          const dist = Math.hypot(dx, dy);
          const minDist = a.r + b.r;

          if (dist > 0 && dist < minDist) {
            const nx = dx / dist;
            const ny = dy / dist;
            const overlap = minDist - dist;

            a.x -= nx * overlap / 2;
            a.y -= ny * overlap / 2;
            b.x += nx * overlap / 2;
            b.y += ny * overlap / 2;

            const tx = -ny;
            const ty = nx;

            const dpTanA = a.vx * tx + a.vy * ty;
            const dpTanB = b.vx * tx + b.vy * ty;
            const dpNormA = a.vx * nx + a.vy * ny;
            const dpNormB = b.vx * nx + b.vy * ny;

            a.vx = tx * dpTanA + nx * dpNormB;
            a.vy = ty * dpTanA + ny * dpNormB;
            b.vx = tx * dpTanB + nx * dpNormA;
            b.vy = ty * dpTanB + ny * dpNormA;
          }
        }
      }
    }

    function drawBall(b) {
      ctx.save();
      ctx.translate(b.x, b.y);
      ctx.rotate(b.angle);

      let fill = b.color;
      if (b.wrongFlash > 0) fill = "#ff304f";
      if (b.goodFlash > 0) fill = "#49c26b";

      ctx.beginPath();
      ctx.arc(0, 0, b.r, 0, Math.PI * 2);
      ctx.fillStyle = fill;
      ctx.fill();

      ctx.lineWidth = 5;
      ctx.strokeStyle = "white";
      ctx.stroke();

      ctx.beginPath();
      ctx.arc(-b.r * 0.28, -b.r * 0.28, b.r * 0.22, 0, Math.PI * 2);
      ctx.fillStyle = "rgba(255,255,255,0.38)";
      ctx.fill();

      if (b.wrongFlash > 0) {
        ctx.lineWidth = 5;
        ctx.strokeStyle = "rgba(255,255,255,0.95)";
        ctx.beginPath();
        ctx.moveTo(-b.r * 0.32, -b.r * 0.32);
        ctx.lineTo(b.r * 0.32, b.r * 0.32);
        ctx.moveTo(b.r * 0.32, -b.r * 0.32);
        ctx.lineTo(-b.r * 0.32, b.r * 0.32);
        ctx.stroke();
      } else {
        ctx.fillStyle = "white";
        ctx.font = `900 ${Math.floor(b.r * 1.35)}px system-ui, sans-serif`;
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        ctx.fillText(b.letter.toUpperCase(), 0, 2);
      }

      ctx.restore();
    }

    function render(ts) {
      if (!lastTime) lastTime = ts;
      const dt = Math.min(0.033, (ts - lastTime) / 1000);
      lastTime = ts;

      updatePhysics(dt);

      const rect = canvas.getBoundingClientRect();
      ctx.clearRect(0, 0, rect.width, rect.height);

      balls.forEach(drawBall);
      animationId = requestAnimationFrame(render);
    }

    let audioCtx = null;
    function playTone(freq, dur, type) {
      try {
        audioCtx = audioCtx || new (window.AudioContext || window.webkitAudioContext)();
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = type;
        osc.frequency.value = freq;
        gain.gain.value = 0.07;
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.start();
        gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + dur);
        osc.stop(audioCtx.currentTime + dur);
      } catch (e) {}
    }

    function speakWord(force = false) {
      if (!("speechSynthesis" in window)) return;
      if (!force && window.innerWidth < 700) return;

      window.speechSynthesis.cancel();
      const utter = new SpeechSynthesisUtterance(currentWord);
      utter.lang = "en-US";
      utter.rate = 0.78;
      utter.pitch = 1.1;
      window.speechSynthesis.speak(utter);
    }

    document.getElementById("nextBtn").addEventListener("click", nextWord);
    document.getElementById("prevBtn").addEventListener("click", prevWord);
    document.getElementById("restartBtn").addEventListener("click", loadWord);
    document.getElementById("speakBtn").addEventListener("click", () => speakWord(true));
    levelSelect.addEventListener("change", () => {
      levelIndex = Number(levelSelect.value);
      wordIndex = 0;
      loadWord();
    });

    canvas.addEventListener("click", handleCanvasClick);
    canvas.addEventListener("touchstart", e => {
      e.preventDefault();
      handleCanvasClick(e);
    }, { passive: false });

    window.addEventListener("resize", () => {
      resizeCanvas();
      createBalls();
    });

    setupLevelSelect();
    loadWord();
    animationId = requestAnimationFrame(render);
  </script>
</body>
</html>
